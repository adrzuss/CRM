<!-- Tabla moderna de artículos -->
<div class="table-responsive modern-table-container">
    <table class="table table-modern table-hover mb-0" id="articulosTable" width="100%">
        <thead class="table-header">
            <tr>
                <th scope="col">
                    <i class="fas fa-barcode me-2"></i>Código
                </th>
                <th scope="col">
                    <i class="fas fa-list me-2"></i>Rubro
                </th>
                <th scope="col">
                    <i class="fas fa-tags me-2"></i>Marca
                </th>
                <th scope="col">
                    <i class="fas fa-align-left me-2"></i>Detalle
                </th>
                <th scope="col">
                    <i class="fas fa-dollar-sign me-2"></i>Costo
                </th>
                <th scope="col" class="text-center">
                    <i class="fas fa-info-circle me-2"></i>Det.
                </th>
                <th scope="col" class="text-center">
                    <i class="fas fa-palette me-2"></i>Color
                </th>
                <th scope="col" class="text-center">
                    <i class="fas fa-layer-group me-2"></i>Comp.
                </th>
                <th scope="col" class="text-center" style="width: 80px;">
                    <i class="fas fa-image me-2"></i>Imagen
                </th>
                <th scope="col" class="text-center" style="width: 120px;">
                    <i class="fas fa-cogs me-2"></i>Acciones
                </th>
            </tr>
        </thead>
        <tbody>
            <!-- El contenido se carga dinámicamente via DataTables -->
        </tbody>
    </table>
</div>

<!-- Loading indicator -->
<div id="tableLoader" class="text-center p-5">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-3 text-muted">Cargando artículos...</p>
</div>
