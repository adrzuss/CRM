
{% extends 'base.html' %}
{% block body %}

<div class="container-fluid px-4 py-3">
    <!-- Breadcrumb moderno -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb modern-breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('index') }}"><i class="fas fa-home"></i> Inicio</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('articulos.articulos') }}"><i class="fas fa-box"></i> Artículos</a></li>
            <li class="breadcrumb-item active" aria-current="page"><i class="fas fa-dollar-sign"></i> Precios</li>
        </ol>
    </nav>

    <!-- Filtros de precios -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card modern-card shadow-sm">
                <div class="card-header modern-header bg-info text-white d-flex align-items-center">
                    <div class="header-icon">
                        <i class="fas fa-filter"></i>
                    </div>
                    <div class="ms-3">
                        <h5 class="card-title mb-0">Filtrar Precios de Artículos</h5>
                        <small class="text-white-50">Selecciona lista, marca y rubro para filtrar el listado</small>
                    </div>
                </div>
                <div class="card-body">
                    <form class="row g-3 align-items-end modern-form">
                        <div class="col-md-4">
                            <div class="form-floating">
                                <select class="form-select form-control-modern" name="idlista" id="idlista">
                                    <option value="">TODOS</option>
                                    {% for lista in listas_precios %}
                                        <option value="{{ lista.id }}">{{ lista.nombre }}</option>
                                    {% endfor %}
                                </select>
                                <label for="idlista"><i class="fas fa-list-alt me-2"></i>Lista</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating">
                                <select class="form-select form-control-modern" name="idmarca" id="idmarca">
                                    <option value="">TODOS</option>
                                    {% for lista in lista_marcas %}
                                        <option value="{{ lista.id }}">{{ lista.nombre }}</option>
                                    {% endfor %}
                                </select>
                                <label for="idmarca"><i class="fas fa-tags me-2"></i>Marca</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-floating">
                                <select class="form-select form-control-modern" name="idrubro" id="idrubro">
                                    <option value="">TODOS</option>
                                    {% for lista in lista_rubros %}
                                        <option value="{{ lista.id }}">{{ lista.nombre }}</option>
                                    {% endfor %}
                                </select>
                                <label for="idrubro"><i class="fas fa-list me-2"></i>Rubro</label>
                            </div>
                        </div>
                        <div class="col-md-2">
                            <button id="btnFiltrar" type="button" class="btn btn-info btn-modern w-100">
                                <i class="fas fa-search me-1"></i>Consultar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabla de precios -->
    <div class="row">
        <div class="col-12">
            <div class="card modern-card shadow-sm">
                <div class="card-header modern-header bg-primary text-white d-flex align-items-center">
                    <div class="header-icon">
                        <i class="fas fa-dollar-sign"></i>
                    </div>
                    <div class="ms-3">
                        <h5 class="card-title mb-0">Precios de Artículos</h5>
                        <small class="text-white-50">Listado actualizado por filtros</small>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="display table table-bordered table-striped" id="preciosTable" style="width:100%">
                            <thead class="table-dark">
                                <tr class="table-light">
                                    <th scope="col"><i class="fas fa-barcode me-1"></i>Código</th>
                                    <th scope="col"><i class="fas fa-list me-1"></i>Rubro</th>
                                    <th scope="col"><i class="fas fa-tags me-1"></i>Marca</th>
                                    <th scope="col"><i class="fas fa-align-left me-1"></i>Detalle</th>
                                    <th scope="col"><i class="fas fa-dollar-sign me-1"></i>Costo</th>
                                    <th scope="col"><i class="fas fa-dollar-sign me-1"></i>Precio</th>
                                </tr>
                            </thead>
                            <tbody class="table-group-divider">
                                <!-- DataTables llenará dinámicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="{{ url_for('static', filename='js/dataTables.js')}}"></script>

<script>
    $(document).ready(function () {
        // Inicializar DataTables
        const table = new DataTable('#preciosTable', {
            processing: true,
            serverSide: true,
            ajax: {
                url: "{{ url_for('articulos.api_lst_precios') }}",
                type: 'GET',
                data: function (d) {
                    d.idlista = $('#idlista').val();
                    d.idmarca = $('#idmarca').val();
                    d.idrubro = $('#idrubro').val();
                },
                error: function (xhr, error, thrown) {
                    alert('Ocurrió un error al cargar los datos. Por favor, intenta nuevamente.');
                }
            },
            columns: [
                { data: 'codigo' ,
                render: function (data, type, row) {
                    return `<a href="update_articulo/${row.id}" >${data}</a>`;
                }},
                { data: 'rubro' },
                { data: 'marca' },
                { data: 'detalle'},
                { data: 'costo' ,
                render: function (data, type, row) {
                    return `$${parseFloat(data).toFixed(2)}`;
                }},
                { data: 'precio' ,
                render: function (data, type, row) {
                    return `$${parseFloat(data).toFixed(2)}`;
                }}
            ],
            language: {
                url: "//cdn.datatables.net/plug-ins/1.13.4/i18n/es-ES.json"
            },
            pageLength: 10,
            lengthMenu: [10, 25, 50, 100]
        });

        // Recargar la tabla cuando se haga clic en el botón "Consultar"
        $('#btnFiltrar').click(function () {
            table.ajax.reload();
        });
    });
</script>

{% endblock %}
