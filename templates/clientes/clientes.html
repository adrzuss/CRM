{% extends 'base.html'%}
{% block body %}

<!-- Breadcrumb moderno -->
<nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb modern-breadcrumb">
        <li class="breadcrumb-item">
            <a href="{{ url_for('index') }}">
                <i class="fas fa-home me-1"></i>Inicio
            </a>
        </li>
        <li class="breadcrumb-item active">
            <i class="fas fa-users me-1"></i>Gestión de Clientes
        </li>
    </ol>
</nav>

<!-- Header de página con diseño moderno -->
<div class="page-header mb-4">
    <div class="d-flex align-items-center">
        <div class="header-icon bg-primary">
            <i class="fas fa-users"></i>
        </div>
        <div class="ms-3">
            <h1 class="page-title mb-0">Gestión de Clientes</h1>
            <p class="page-subtitle text-muted mb-0">Administra la información de tus clientes</p>
        </div>
    </div>
</div>

<div class="container-fluid">
    <!-- Formulario de ingreso -->
    <div class="row mb-4">
        <div class="col-12">
            {% include 'clientes/partials/_add-clientes.html' %}
        </div>  
    </div>
    
    <!-- Lista de clientes -->
    <div class="row">
        <div class="col-12">
            {% include 'clientes/partials/_lst-clientes.html' %}
        </div>     
    </div>
</div>      

    <script src="{{ url_for('static', filename='vendor/datatable/jquery-3.7.1.js')}}"></script>
    <script src="{{ url_for('static', filename='vendor/datatable/datatables.js')}}"></script>
    
    <script>

        document.getElementById("provincia").addEventListener("change", function() {
            const provinciaId = this.value;
            fetch(`${BASE_URL}/clientes/localidades/${provinciaId}`)
                .then(response => response.json())
                .then(data => {
                    const localidadSelect = document.getElementById("localidad");
                    localidadSelect.innerHTML = '';
                    data.localidades.forEach(localidad => {
                        console.log(localidad);
                        const option = document.createElement("option");
                        option.value = localidad.id;
                        option.textContent = localidad.localidad;
                        localidadSelect.appendChild(option);
                    });
                })
                .catch(error => console.error('Error fetching localidades:', error));
        }); 

        document.getElementById("documento").addEventListener("blur", function() {
            checkCuit();
        });

        document.getElementById("documento").addEventListener("blur", function() {
            checkCuit();
        });

        async function checkCuit() {
            const cuit = document.getElementById("documento").value;
            const tipoDoc = document.getElementById("tipo_doc").value;

            response = await fetch(`/checkCuit/${cuit}/${tipoDoc}`);
            const data = await response.json();

            let cuitValido = data.cuitValido;
            if (!cuitValido) {
                alert("El CUIT ingresado no es válido");
            } 
        }
            
        new DataTable('#dataTable', {
            iDisplayLength: 50,
            language: {
                entries: {
                    _: "entradas",
                    1: "entrada"
                },
                sInfo: "Mostrando _START_ de _END_ de un total de _TOTAL_ _ENTRIES-TOTAL_",
                sInfoEmpty: "Mostrando 0 de 0 de 0 _ENTRIES-TOTAL_",
                sInfoFiltered: "(Filtrando _MAX_ de un total de _ENTRIES-MAX_)",
                sLengthMenu: "_MENU_ _ENTRIES_ por página",
                sSearch: 'Buscar',
                sSearchPlaceholder: 'Buscar registros'
            }
        });
        
    </script>
{% endblock %}
