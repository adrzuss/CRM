<div class="table-responsive">
    <table class="table table-hover align-middle mb-0" id="dataTable2" width="100%">
        <thead class="table-dark">
            <tr>
                <th scope="col"><i class="fas fa-user me-2"></i>Cliente</th>
                <th scope="col" class="text-center"><i class="fas fa-dollar-sign me-2"></i>Total Facturado</th>
                <th scope="col" class="text-center"><i class="fas fa-percentage me-2"></i>Porcentaje</th>
            </tr>
        </thead>
        <tbody>
            {% for abc_monto in abc_montos %}
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="avatar-sm bg-success text-white rounded-circle d-flex align-items-center justify-content-center me-3">
                                <i class="fas fa-user"></i>
                            </div>
                            <strong>{{ abc_monto.nombre }}</strong>
                        </div>
                    </td>
                    <td class="text-center">
                        <span class="badge bg-success fs-6">${{ "{:,.2f}"|format(abc_monto.total) }}</span>
                    </td>
                    <td class="text-center">
                        <div class="d-flex align-items-center justify-content-center">
                            <div class="progress" style="width: 60px; height: 20px;">
                                <div class="progress-bar bg-success" role="progressbar" 
                                     style="width: {{ abc_monto.porcentaje }}%" 
                                     aria-valuenow="{{ abc_monto.porcentaje }}" 
                                     aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                            <span class="ms-2 fw-bold">{{ "%.2f"|format(abc_monto.porcentaje) }}%</span>
                        </div>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
