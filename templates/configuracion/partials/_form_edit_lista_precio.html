{# Formulario de edición - Lista de Precios #}
<h5 class="mb-3">Editar Lista de Precios</h5>
<form hx-post="{{ url_for('configuraciones.update_lista_precio', id=item.id) }}" 
      hx-target="#tabla-listas_precios" 
      hx-swap="innerHTML">
    <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" name="nombre" id="nombre" value="{{ item.nombre }}" required>
    </div>
    <div class="mb-3">
        <label for="markup" class="form-label">Markup (%)</label>
        <input type="number" step="0.01" class="form-control" name="markup" id="markup" value="{{ item.markup }}" required>
    </div>
    <div class="modal-footer px-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-exito">Guardar cambios</button>
    </div>
</form>
