{# Tabla de Detalles de Artículos - Partial para HTMX #}
<div class="card-body">
    <div class="table-responsive">
        <table class="table table-dark">
            <thead>
                <tr>
                    <th scope="col">Nombre</th>
                    <th scope="col">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for detalle in detalles_articulos %}
                <tr class="table table-light">
                    <td>{{ detalle.nombre }}</td>
                    <td>
                        <button class="btn btn-exito btn-sm" 
                                hx-get="{{ url_for('configuraciones.get_detalle_articulo', id=detalle.id) }}"
                                hx-target="#modal-config-body"
                                hx-swap="innerHTML"
                                data-bs-toggle="modal" 
                                data-bs-target="#modalConfigEditar">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
