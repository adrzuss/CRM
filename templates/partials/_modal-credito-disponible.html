<!-- Modal para confirmación de aplicar crédito disponible -->
<div class="modal fade" id="creditoDisponibleModal" tabindex="-1" role="dialog" aria-labelledby="creditoDisponibleModalLabel">
    <div class="modal-dialog modal-md" role="document">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title" id="creditoDisponibleModalLabel">
                    💳 Crédito Disponible
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="alert alert-info">
                    <h6>ℹ️ El cliente tiene crédito disponible</h6>
                </div>
                
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-title text-primary">Información del Crédito:</h6>
                                <div class="row">
                                    <div class="col-6">
                                        <strong>ID Crédito:</strong>
                                        <p class="mb-1 text-info" id="credito-id">-</p>
                                    </div>
                                    <div class="col-6">
                                        <strong>Estado:</strong>
                                        <p class="mb-1" id="credito-estado">-</p>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-6">
                                        <strong>Monto Disponible:</strong>
                                        <p class="mb-1 text-success font-weight-bold" id="credito-monto">$ -</p>
                                    </div>
                                    <div class="col-6">
                                        <strong>Cuotas:</strong>
                                        <p class="mb-1" id="credito-cuotas">-</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-3">
                    <p class="text-muted">
                        ❓ ¿Desea aplicar este crédito a la venta actual?
                    </p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">
                    ❌ No, continuar sin crédito
                </button>
                <button type="button" class="btn btn-success">
                    ✅ Sí, aplicar crédito
                </button>
            </div>
        </div>
    </div>
</div>
