<!-- Modal para selección de colores y detalles -->
<div class="modal fade" id="modalColorDetalle" tabindex="-1" aria-labelledby="modalColorDetalleLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalColorDetalleLabel">
                    Seleccionar color y/o detalle
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <!-- Sección de colores -->
                    <div class="col-md-6" id="seccion-colores" style="display: none;">
                        <h6><i class="fa fa-palette"></i> Seleccionar Color</h6>
                        <div class="colores-grid-modal">
                            <!-- Los colores se cargan dinámicamente -->
                        </div>
                        <small class="text-muted d-block mt-2">
                            <span class="color-selection-info">Selecciona un color</span>
                        </small>
                    </div>
                    
                    <!-- Sección de detalles -->
                    <div class="col-md-6" id="seccion-detalles" style="display: none;">
                        <h6><i class="fa fa-tags"></i> Seleccionar Detalle</h6>
                        <div class="detalles-grid-modal">
                            <!-- Los detalles se cargan dinámicamente -->
                        </div>
                        <small class="text-muted d-block mt-2">
                            <span class="detalle-selection-info">Selecciona un detalle</span>
                        </small>
                    </div>
                    
                    <!-- Mensaje cuando no hay colores ni detalles -->
                    <div class="col-12" id="sin-opciones" style="display: none;">
                        <div class="alert alert-info">
                            <i class="fa fa-info-circle"></i>
                            Este artículo no tiene colores ni detalles configurados.
                        </div>
                    </div>
                </div>
                
                <!-- Información del artículo seleccionado -->
                <div class="mt-3 p-3 bg-light rounded">
                    <strong>Artículo:</strong> 
                    <span id="modal-articulo-info">-</span>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">
                    <i class="fa fa-times"></i> Cancelar
                </button>
                <button type="button" class="btn btn-primary" id="btn-confirmar-seleccion" disabled>
                    <i class="fa fa-check"></i> Confirmar selección
                </button>
            </div>
        </div>
    </div>
</div>
