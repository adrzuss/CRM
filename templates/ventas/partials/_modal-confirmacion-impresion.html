<!-- Modal de confirmación de impresión -->
    <div class="modal fade" id="modalConfirmarImpresion" tabindex="-1" aria-labelledby="modalConfirmarImpresionLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="modalConfirmarImpresionLabel">
                        <i class="fas fa-check-circle me-2"></i>Venta Grabada Exitosamente
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <div class="mb-3">
                        <i class="fas fa-print fa-4x text-primary"></i>
                    </div>
                    <h5 class="mb-3">¿Desea imprimir la factura?</h5>
                    <p class="text-muted mb-0">La factura se ha guardado correctamente.</p>
                    <p class="text-muted">Factura ID: <strong id="facturaIdConfirmacion"></strong></p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary btn-lg" data-bs-dismiss="modal" id="btnNoImprimir">
                        <i class="fas fa-times me-2"></i>No, gracias
                    </button>
                    <button type="button" class="btn btn-primary btn-lg" id="btnSiImprimir">
                        <i class="fas fa-print me-2"></i>Sí, imprimir
                    </button>
                </div>
            </div>
        </div>
    </div>
